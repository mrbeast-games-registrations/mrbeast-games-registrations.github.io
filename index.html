<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Beast Games</title>
    <style>
        iframe {
            width: 100%;
            max-width: 640px;
            height: auto;
            aspect-ratio: 16 / 9;
            border: none;
            margin-bottom: 30px;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }
        .bg {
            background-image: url("1784156206357.jpg");
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;

        .overlay {
            background-color: rgba(0, 0, 0, 0.5);

            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;

            font-size: 3rem;
            margin-bottom: 10px;
        }

            font-size: 2rem;
            margin-bottom: 30px;
        }

        .register-btn {
            background-color: transparent;
            border: 2px solid #0056b3;
            color: #ffffff;
            padding: 15px 40px;
            font-size: 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            margin-bottom: 50px;
            display: inline-block;
        }

        .register-btn:hover {
            background-color: #0056b3;
        }

        .social-icons a {
            margin: 0 15px;
            color: white;
            font-size: 2rem;
            text-decoration: none;
        }
    </style>
</head>

    <div class="bg">

            <iframe src="https://www.youtube.com/embed/SI3CrHUAGqM?si=KagWqsNpavtg9gbS" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
